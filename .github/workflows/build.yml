name: SHIELD-AI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: List Schemes
        run: xcodebuild -project SHIELD-AI.xcodeproj -list

      - name: Build
        run: |
          xcodebuild \
            -project SHIELD-AI.xcodeproj \
            -scheme SHIELD-AI \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            build \
            CODE_SIGNING_ALLOWED=NO
