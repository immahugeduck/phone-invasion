- name: List Schemes
  run: xcodebuild -project SHIELD-AI.xcodeproj -list

- name: Build
  run: |
    xcodebuild \
      -project SHIELD-AI.xcodeproj \
      -scheme SHIELD-AI \
      -sdk iphonesimulator \
      -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
      build \
      CODE_SIGNING_ALLOWED=NO
