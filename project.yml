name: PhoneInvasion
options:
  bundleIdPrefix: com.phoneinvasion
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.phoneinvasion.app
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9

targets:
  PhoneInvasion:
    type: application
    platform: iOS
    sources:
      - path: PhoneInvasion
        createIntermediateGroups: true
    settings:
      base:
        INFOPLIST_FILE: PhoneInvasion/Supporting/Info.plist
    info:
      path: PhoneInvasion/Supporting/Info.plist
      properties:
        CFBundleName: Phone Invasion
        CFBundleDisplayName: Phone Invasion
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: >
          Phone Invasion uses your location to check for nearby rogue cell towers.
        NSLocalNetworkUsageDescription: >
          Phone Invasion scans your local network for security threats.
